<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>

  <!-- Fork: 3 tines -->
  <line x1="11" y1="5.5" x2="11" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="5.5" x2="16" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="5.5" x2="21" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Fork: curved neck connecting tines -->
  <path d="M11 14 Q10.5 17.5 16 18 Q21.5 17.5 21 14"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Fork: handle -->
  <line x1="16" y1="18" x2="16" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
